<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <!-- Single AirPod-style earbud: rounded head + thin stem.
       Very Mac-native, distinctive vs sound waves and microphones. -->
  <g fill="black">
    <!-- bud head -->
    <ellipse cx="9" cy="8" rx="6" ry="5"/>
    <!-- stem extending down-right -->
    <rect x="11" y="9" width="3" height="10" rx="1.5" transform="rotate(-15 12.5 14)"/>
  </g>
  <!-- speaker dot to suggest "listening" -->
  <circle cx="9" cy="8" r="1.5" fill="white"/>
</svg>
