<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <!-- Vinyl record / disc: solid black circle with two concentric inner
       rings (grooves) and a center dot label. -->
  <circle cx="11" cy="11" r="9" fill="black"/>
  <g fill="none" stroke="white" stroke-width="0.6">
    <circle cx="11" cy="11" r="6.5"/>
    <circle cx="11" cy="11" r="4.5"/>
  </g>
  <circle cx="11" cy="11" r="2.2" fill="white"/>
  <circle cx="11" cy="11" r="0.6" fill="black"/>
</svg>
