<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dock/Finder icon: dark squircle background + the same outline-
       circle-with-sound-wave glyph used in the menu bar template, scaled
       up. Squircle (rx=112) matches the macOS icon aesthetic; the inner
       glyph stays consistent across sizes. -->
  <circle cx="256" cy="256" r="248" fill="#0b0f17"/>
  <g transform="translate(256 256)">
    <circle cx="0" cy="0" r="160" fill="none" stroke="#e6f0ff" stroke-width="22"/>
    <g fill="#e6f0ff">
      <rect x="-72" y="-40" width="22" height="80"  rx="11"/>
      <rect x="-11" y="-100" width="22" height="200" rx="11"/>
      <rect x="50"  y="-40" width="22" height="80"  rx="11"/>
    </g>
  </g>
</svg>
