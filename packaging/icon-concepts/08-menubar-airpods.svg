<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <!-- AirPods pair, slightly stylized: two stems with rounded heads,
       angled inward like they're sitting in ears. -->
  <g fill="black">
    <!-- left -->
    <g transform="translate(0, 0) rotate(-12 6 8)">
      <ellipse cx="6" cy="6" rx="3" ry="2.5"/>
      <rect x="5" y="6.5" width="2" height="9" rx="1"/>
    </g>
    <!-- right -->
    <g transform="translate(10, 0) rotate(12 6 8)">
      <ellipse cx="6" cy="6" rx="3" ry="2.5"/>
      <rect x="5" y="6.5" width="2" height="9" rx="1"/>
    </g>
  </g>
</svg>
