<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <!-- Outline circle with three short sound-wave bars inside. The wave
       lives inside the circle, signalling "audio contained" / "voice
       coming from this thing." -->
  <circle cx="11" cy="11" r="8" fill="none" stroke="black" stroke-width="2"/>
  <g fill="black">
    <rect x="7"   y="9"  width="1.6" height="4" rx="0.8"/>
    <rect x="10.2" y="6.5" width="1.6" height="9" rx="0.8"/>
    <rect x="13.4" y="9"  width="1.6" height="4" rx="0.8"/>
  </g>
</svg>
