<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Heard</title>
<!--
  Heard — persistent onboarding / home window (rendered in a native WKWebView,
  NOT a browser). Onboarding is a re-openable task checklist; each task reflects
  real app state pushed in from native via window.__heard.setState(...). Actions
  call window.webkit.messageHandlers.heard.postMessage({action, ...}).

  Visual layer ported from Claude Design project f8da9b96, direction 2a (Pro) +
  2b (Power): Instrument Serif hero, oklch terracotta→periwinkle orb, ambient
  glows, "Set up X" rail with a progress bar. The native window uses a
  transparent titlebar (see home_window.py) so this chrome shows through.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#efece7; --card:#faf8f5; --ink:#0b0b0c; --ink-2:#6f6f6f; --ink-3:#a49f98;
    --line:#e4e0d9; --terra:#b25b41; --peri:#8c93d6; --peri-hi:#6f77c4; --ok:#4c9a6a;
    --serif:'Instrument Serif',Georgia,serif; --sans:'Inter',-apple-system,system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --orb:radial-gradient(circle at 34% 28%,oklch(86% .1 45),oklch(73% .12 36) 42%,oklch(70% .1 266) 76%,oklch(58% .09 282));
  }
  @keyframes wf{0%,100%{transform:scaleY(.28)}50%{transform:scaleY(1)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);
    -webkit-font-smoothing:antialiased;overflow:hidden;}
  /* ambient glows behind everything (from the design) */
  #glow{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(520px 400px at 82% 26%,rgba(233,140,116,.20),transparent 70%),
      radial-gradient(560px 460px at 14% 92%,rgba(140,147,214,.18),transparent 70%),
      radial-gradient(1200px 700px at 22% 2%,#f4f1ec,#efece7 60%);}
  #app{position:relative;z-index:1;height:100vh;display:grid;grid-template-columns:250px 1fr;}

  /* titlebar space (native traffic lights float top-left over this) */
  /* Native titlebar now handles chrome + dragging — hide the in-HTML ones. */
  .titlebar{display:none;}

  /* ---- rail: "Set up X" + progress + task checklist ---- */
  #rail{padding:8px 24px 24px;display:flex;flex-direction:column;border-right:1px solid var(--line);}
  #rail-title{font-family:var(--serif);font-size:27px;letter-spacing:-.01em;color:var(--ink);margin:6px 0 16px;}
  .prog{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
  .prog .bar{flex:1;height:4px;border-radius:3px;background:#e6e2db;overflow:hidden;}
  .prog .bar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--terra),var(--peri));transition:width .4s ease;}
  .prog .n{font:500 11px var(--mono);color:var(--ink-3);}
  #tasks{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px;}
  .task{display:flex;align-items:center;gap:13px;padding:9px 6px;border-radius:9px;cursor:pointer;color:var(--ink-2);font-size:14px;}
  .task:hover{color:var(--ink);}
  .task.active{color:var(--ink);font-weight:500;}
  .task .dot{width:22px;height:22px;border-radius:50%;border:1.5px solid #d9d4cc;flex:0 0 auto;display:grid;place-items:center;font-size:12px;color:transparent;}
  .task.active .dot{border-color:var(--ink);}
  .task.done .dot{background:var(--ok);border-color:var(--ok);color:#fff;}
  .rail-foot{margin-top:auto;font:400 12px var(--sans);color:var(--ink-3);}
  .rail-foot b{color:var(--ink-2);font-weight:500;}

  /* ---- stage: the active screen ---- */
  #stage{position:relative;overflow:hidden;}
  .screen{position:absolute;inset:0;padding:40px 60px 56px;display:none;flex-direction:column;animation:fadein .3s ease;}
  .screen.show{display:flex;}
  .eyebrow{font:600 11px var(--mono);color:var(--terra);text-transform:uppercase;letter-spacing:.18em;}
  .hero{font-family:var(--serif);font-weight:400;font-size:74px;line-height:1.0;letter-spacing:-.015em;margin:16px 0 0;max-width:9ch;}
  .lede{font-size:16px;color:var(--ink-2);line-height:1.55;max-width:440px;margin-top:20px;}
  .spacer{flex:1;}
  .row{display:flex;gap:12px;align-items:center;}
  .btn{font:600 15px var(--sans);border-radius:12px;padding:14px 26px;border:1px solid transparent;cursor:pointer;-webkit-app-region:no-drag;}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-ghost{background:transparent;border-color:var(--line);color:var(--ink);}
  .btn-oauth{background:#fff;border:1px solid var(--line);color:var(--ink);display:inline-flex;align-items:center;justify-content:center;gap:10px;}
  .btn-oauth:hover{border-color:#cfc8bd;}
  .btn-oauth svg{flex:0 0 auto;}
  .or-divider{display:flex;align-items:center;gap:12px;color:var(--ink-3);font:500 12px var(--sans);margin:4px 0;}
  .or-divider::before,.or-divider::after{content:"";flex:1;height:1px;background:var(--line);}
  .kbd{font:500 13px var(--mono);background:#fff;border:1px solid var(--line);border-bottom-width:2px;border-radius:7px;padding:3px 8px;}
  .field{width:100%;max-width:420px;padding:14px 16px;font-size:15px;border-radius:12px;border:1px solid var(--line);outline:none;background:#fff;}
  .done-note{color:var(--ok);font-size:13px;display:inline-flex;align-items:center;gap:6px;}

  /* the orb — big floating sphere from the design */
  .orb{position:absolute;right:64px;top:50%;transform:translateY(-50%);width:190px;height:190px;border-radius:50%;
    background:var(--orb);box-shadow:0 40px 80px -24px rgba(120,80,120,.5),inset 0 -12px 34px rgba(70,55,110,.35);
    animation:floaty 6s ease-in-out infinite;}
  .orb.sm{position:static;transform:none;width:120px;height:120px;margin-top:30px;animation:floaty 5s ease-in-out infinite;}

  /* per-beat: voice cards */
  .vcards{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;max-width:560px;margin-top:26px;}
  .vcard{border:1px solid var(--line);border-radius:13px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:var(--card);position:relative;transition:border-color .15s;}
  .vcard:hover{border-color:#cfc8bd;}
  .vcard.sel{border:1.5px solid var(--ink);}
  .vcard .av{width:48px;height:48px;border-radius:50%;position:relative;}
  .vpreview{margin-top:6px;border:1px solid var(--line);background:#fff;color:var(--ink-2);font:500 10.5px var(--sans);cursor:pointer;padding:4px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;transition:all .12s;}
  .vpreview:hover{border-color:var(--terra);color:var(--terra);}
  .vpreview .tri{font-size:8px;}
  .vpreview.playing{border-color:var(--terra);color:var(--terra);background:rgba(178,91,65,.06);}
  .vcard .nm{font:500 13px var(--sans);color:var(--ink);}
  .vcard .ta{font:400 9px var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);}
  .vcard .ck{position:absolute;top:9px;right:10px;width:16px;height:16px;border-radius:50%;background:var(--ink);color:#fff;font-size:9px;display:none;align-items:center;justify-content:center;}
  .vbadge{position:absolute;top:0;left:50%;transform:translate(-50%,-50%);white-space:nowrap;font:600 8px var(--mono);letter-spacing:.05em;text-transform:uppercase;color:#fff;background:var(--terra);padding:4px 9px;border-radius:999px;box-shadow:0 3px 8px rgba(178,91,65,.35);z-index:2;}
  .modecard{display:flex;align-items:flex-start;gap:12px;border:1px solid var(--line);border-radius:13px;padding:10px 14px;cursor:pointer;background:var(--card);transition:border-color .15s,box-shadow .15s;}
  .modecard.sel{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink);}
  .mode-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;margin-top:2px;position:relative;}
  .modecard.sel .mode-radio{border-color:var(--ink);background:var(--ink);}
  .modecard.sel .mode-radio::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;line-height:1;}
  .mode-rec{font:600 8px var(--mono);letter-spacing:.05em;text-transform:uppercase;color:var(--terra);background:rgba(178,91,65,.12);padding:3px 7px;border-radius:999px;}
  .mode-tag{font:500 11px var(--sans);color:var(--ink-3);margin-left:auto;}
  .mode-play{width:32px;height:32px;border-radius:50%;flex:0 0 auto;margin-top:1px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:10px;color:var(--ink);display:flex;align-items:center;justify-content:center;}
  .modecard.sel .mode-play{background:var(--ink);color:#fff;border-color:var(--ink);}
  .mode-play.muted,.modecard.sel .mode-play.muted{background:#e7e3de;color:#b8b2aa;border-color:#e7e3de;cursor:default;}
  .vcard.sel .ck{display:flex;}
  /* per-beat: mic listening */
  @keyframes listen{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.09);opacity:1}}
  @keyframes ring2{0%{transform:scale(.8);opacity:.5}100%{transform:scale(2);opacity:0}}
  .listen-wrap{position:relative;width:150px;height:150px;margin-top:24px;display:grid;place-items:center;}
  .listen{width:120px;height:120px;border-radius:50%;background:var(--orb);animation:listen 1.4s ease-in-out infinite;box-shadow:0 20px 50px -16px rgba(120,80,120,.5);}
  .listen-wrap .rr{position:absolute;width:120px;height:120px;border-radius:50%;border:2px solid var(--terra);animation:ring2 2.2s ease-out infinite;}
  .listen-lbl{font:600 10px var(--mono);letter-spacing:.18em;color:var(--terra);margin-top:16px;}
  /* per-beat: pairing */
  .qr{width:154px;height:154px;border-radius:16px;background:#fff;border:1px solid var(--line);margin-top:24px;display:grid;place-items:center;font:500 11px var(--mono);color:var(--ink-3);box-shadow:0 10px 30px -16px rgba(0,0,0,.25);}

  /* ===================== HOME (Mission Control) ===================== */
  #home{position:relative;z-index:1;height:100vh;display:none;flex-direction:column;background:#fff;}
  .h-title{display:none;}
  .h-body{display:flex;flex:1;min-height:0;}
  .h-side{width:214px;flex:0 0 auto;border-right:1px solid #efefef;padding:6px 16px 18px;display:flex;flex-direction:column;background:#fcfcfc;}
  .h-brand{display:flex;align-items:center;gap:9px;padding:2px 6px 16px;}
  .h-brand .o{width:24px;height:24px;border-radius:50%;background:var(--orb);}
  .h-brand span{font:600 15px var(--sans);color:var(--ink);}
  .h-nav{display:flex;flex-direction:column;gap:3px;}
  .h-nav a{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:9px;cursor:pointer;font:400 12.5px var(--sans);color:var(--ink-2);}
  .h-nav a .d{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5;}
  .h-nav a.on{background:var(--ink);color:#fff;font-weight:500;}
  .h-nav a.on .d{opacity:.9;}
  .h-today{margin-top:auto;padding:12px;border:1px solid #eee;border-radius:12px;background:#fff;}
  .h-today .k{font:500 9.5px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:#bdbdbd;margin-bottom:6px;}
  .h-today .big{font-family:var(--serif);font-size:27px;line-height:1;color:var(--ink);}
  .h-today .sub{font:400 11px var(--sans);color:#8a8a8a;margin-top:3px;}
  .h-main{flex:1;min-width:0;background:#fafafa;overflow-y:auto;}
  .h-view{display:none;} .h-view.on{display:block;}
  /* now-narrating banner */
  .now{margin:18px;padding:17px 20px;border-radius:14px;display:flex;align-items:center;gap:16px;
    background:linear-gradient(105deg,rgba(233,140,116,.14),rgba(140,147,214,.14) 70%);border:1px solid rgba(140,147,214,.16);}
  .now .o{width:42px;height:42px;border-radius:50%;flex:0 0 auto;background:var(--orb);}
  .now .k{font:500 9.5px var(--mono);letter-spacing:.13em;text-transform:uppercase;color:#9a8fa0;margin-bottom:4px;}
  .now .q{font-family:var(--serif);font-style:italic;font-size:20px;line-height:1.3;color:var(--ink);}
  .now .wv{display:flex;align-items:flex-end;gap:3px;height:30px;flex:0 0 auto;}
  .now .wv i{width:3px;border-radius:3px;background:linear-gradient(180deg,#cf7d64,#8c93d6);}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 18px 18px;}
  .pcard{background:#fff;border:1px solid #ececec;border-radius:13px;padding:15px 16px;}
  .pcard .top{display:flex;align-items:center;gap:8px;margin-bottom:11px;}
  .pcard .nm{font:500 14px var(--sans);color:var(--ink);}
  .pcard .ag{font:400 10px var(--mono);color:#a3a3a3;}
  .pill{margin-left:auto;display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font:500 10px var(--mono);}
  .pill .d{width:5px;height:5px;border-radius:50%;}
  .pill.speaking{background:rgba(233,140,116,.14);color:#b25b41;} .pill.speaking .d{background:#cf7d64;}
  .pill.building{background:rgba(140,180,214,.16);color:#4a7da0;} .pill.building .d{background:#8cb4d6;}
  .pill.await{background:rgba(226,200,120,.2);color:#937c2e;} .pill.await .d{background:#e2c878;}
  .pill.blocked{background:rgba(214,140,150,.18);color:#a8505f;} .pill.blocked .d{background:#d68c96;}
  .pill.idle{background:#efece7;color:#a49f98;} .pill.idle .d{background:#c7c2b9;}
  .pcard .ln{font:400 12px/1.5 var(--sans);color:var(--ink-2);}
  .pcard .ln .t{color:#bdbdbd;font-family:var(--mono);font-size:10px;}
  .pbar{margin-top:12px;height:4px;border-radius:3px;background:#f0f0f0;overflow:hidden;}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,#cf7d64,#8c93d6);}
  .pacts{margin-top:12px;display:flex;gap:7px;}
  .pacts a{padding:5px 12px;border-radius:8px;font:500 11px var(--sans);cursor:pointer;}
  .pacts a.p{background:var(--ink);color:#fff;} .pacts a.g{border:1px solid #e6e6e6;color:var(--ink-2);}
  /* transcript */
  .h-pad{padding:22px 24px;}
  .h-h{font-family:var(--serif);font-size:26px;color:var(--ink);margin-bottom:16px;}
  .tr{display:flex;gap:13px;margin-bottom:14px;}
  .tr .tt{font:400 10px var(--mono);color:#bdbdbd;flex:0 0 44px;padding-top:3px;}
  .tr .proj{font:500 11px var(--sans);margin-bottom:2px;}
  .tr .say{font-family:var(--serif);font-style:italic;font-size:16px;line-height:1.4;color:var(--ink);}
</style>
</head>
<body>
<div id="glow"></div>
<div id="app">
  <div class="titlebar" id="titlebar">Heard — Set up</div>
  <aside id="rail">
    <div id="rail-title">Set up</div>
    <div class="prog"><div class="bar"><i id="prog-fill" style="width:0%"></i></div><span class="n" id="prog-n">0 / 0</span></div>
    <ul id="tasks"></ul>
    <div class="rail-foot">Your plan · <b id="rail-plan">Free</b></div>
  </aside>
  <main id="stage"></main>
</div>

<div id="home">
  <div class="h-title" id="h-title">Heard — Mission Control</div>
  <div class="h-body">
    <div class="h-side">
      <div class="h-brand"><div class="o"></div><span>Heard</span></div>
      <div class="h-nav" id="h-nav">
        <a data-v="mission" class="on"><span class="d"></span>Mission Control</a>
        <a data-v="transcript"><span class="d"></span>Transcript</a>
        <a data-v="settings"><span class="d"></span>Settings</a>
      </div>
      <div class="h-today"><div class="k">Today</div><div class="big" id="h-today-big">—</div><div class="sub" id="h-today-sub">narrated</div></div>
    </div>
    <div class="h-main">
      <div class="h-view on" id="v-mission"></div>
      <div class="h-view" id="v-transcript"></div>
      <div class="h-view" id="v-settings"></div>
    </div>
  </div>
</div>

<script>
// ------------------------------------------------------------------ bridge
function bridge(action, extra){
  try{ window.webkit.messageHandlers.heard.postMessage(Object.assign({action}, extra||{})); }
  catch(e){ console.log('[bridge]', action, extra||''); }
}

// ------------------------------------------------------------------ state
let S = {
  signedIn:false, email:'', plan:'free', trialDaysLeft:null, onboardedPlan:null,
  agentConnected:false, micGranted:false, axGranted:false,
  voice:null, whisperOn:false, phonePaired:false,
};
window.__heard = {
  setState(patch){ Object.assign(S, patch||{}); render(); },
  goto(taskId){ current = taskId || null; render(); },
};
// dev preview: onboarding.html?plan=power | ?plan=pro&upgrade=1 | ?trial=1
(function(){ const q=new URLSearchParams(location.search);
  if(q.get('plan')){ S.plan=q.get('plan'); S.signedIn=q.get('plan')!=='free'; S.email='you@example.com'; }
  if(q.get('upgrade')){ S.plan='power'; S.onboardedPlan='pro'; S.signedIn=true; }
  if(q.get('trial')){ S.trialDaysLeft=14; }
})();

// ------------------------------------------------------------------ tasks
const T = {
  welcome:{id:'welcome', label:'Welcome',              done:()=>false},
  signin: {id:'signin',  label:'Log in',               done:()=>S.signedIn},
  connect:{id:'connect', label:'Connect your tools',   done:()=>S.agentConnected},
  mode:   {id:'mode',    label:'Choose your mode',     done:()=>!!S.mode},
  voice:  {id:'voice',   label:'Choose your voice',    done:()=>['aria','friday','jarvis','atlas'].includes((S.voice||'').toLowerCase())},
  whisper:{id:'whisper', label:'Enable Heard Whisper', done:()=>S.whisperOn},
  phone:  {id:'phone',   label:'Pair Heard Mobile',    done:()=>S.phonePaired},
  done:   {id:'done',    label:'',                     done:()=>false},
};
// Flows match the design (2a Pro / 2b Power). welcome + done are non-task
// screens (excluded from the rail + progress).
function flow(){
  const upgrade = S.plan==='power' && S.onboardedPlan==='pro';
  if (upgrade)          return [T.welcome, T.whisper, T.phone, T.done];                       // Pro→Power delta
  if (S.plan==='power') return [T.welcome, T.signin, T.connect, T.voice, T.whisper, T.phone, T.done]; // 2b Power
  return [T.welcome, T.signin, T.connect, T.mode, T.voice, T.done];                            // 2a Pro
}
function planWord(){ return S.plan==='power'?'Power':S.plan==='pro'?'Pro':'Free'; }
// The Power upsell row in the Account card. One block, four states, so the
// journey reads in one place: trialing → keep it; trial ended → upgrade (Pro
// users get Power only, Free users get Power+Pro); never trialed → start free;
// on Power plan but wrong build → get the app. Returns '' when nothing applies
// (paying Power, or not signed in).
function _powerUpsell(){
  const line = (t,s)=>`<div><div style="font-weight:600">${t}</div><div style="font:400 13px var(--sans);color:var(--ink-2);margin-top:2px">${s}</div></div>`;
  const payBtns = `<div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-primary" style="padding:9px 16px;flex:1" onclick="bridge('upgrade_power',{interval:'monthly'})">$30 / month</button><button class="btn btn-primary" style="padding:9px 16px;flex:1" onclick="bridge('upgrade_power',{interval:'annual'})">$24 / mo · annual</button></div>`;
  const wrap = (inner)=>`<div style="border-top:1px solid var(--line);margin:14px -18px 0;padding:14px 18px 0">${inner}</div>`;
  if(!S.signedIn) return '';
  // On Power plan but on the standard build → they need the Power app.
  if(S.plan==='power' && !S.powerBuild)
    return wrap(`<div style="display:flex;align-items:center;justify-content:space-between;gap:12px">${line('Get the Power app',"You're on Power - install the Power app to unlock voice input.")}<button class="btn btn-primary" style="padding:9px 16px" onclick="bridge('open_power_page')">Download</button></div>`);
  // Trialing → keep it.
  if(S.plan==='power' && S.trialDaysLeft!=null){
    const d = S.trialDaysLeft===0?'Your trial ends today':S.trialDaysLeft+' day'+(S.trialDaysLeft===1?'':'s')+' left';
    return wrap(line('Upgrade to Power', d+' in your trial - upgrade now to keep hands-free voice.')+payBtns);
  }
  if(!S.powerBuild) return '';   // OSS/Pro build, nothing Power to offer here
  // Trial ended (reverted off Power).
  if(S.plan!=='power' && S.powerTrialUsed){
    if(S.plan==='pro'||S.plan==='pro_plus')
      return wrap(line('Your Power trial ended',"You're back on Pro. Add Power for hands-free voice control.")+payBtns);
    return wrap(line('Your Power trial ended','Get Power for hands-free voice, or Pro for managed cloud voices.')+payBtns+`<button class="btn" style="padding:9px 16px;margin-top:8px;width:100%" onclick="bridge('manage_account')">Or upgrade to Pro - $15/mo</button>`);
  }
  // Never trialed, still eligible → start the free trial.
  if(S.plan!=='power' && !S.powerTrialUsed)
    return wrap(`<div style="display:flex;align-items:center;justify-content:space-between;gap:12px">${line('Try Power free','14 days of hands-free voice control. No card.')}<button class="btn btn-primary" style="padding:9px 16px" onclick="bridge('start_power_trial')">Start trial</button></div>`);
  return '';
}

// ------------------------------------------------------------------ render
let current = null;
let navHome = 'mission';
function homeMode(){
  if(new URLSearchParams(location.search).get('view')==='home') return true;
  // Once signed in and set up, the window IS the Home. onboardedPlan tracks the
  // new flow (for the Pro->Power delta); S.onboarded covers existing users who
  // set up before the new onboarding shipped.
  return S.signedIn && (S.onboardedPlan===S.plan || S.onboarded);
}
function render(){
  if(homeMode()){
    document.getElementById('app').style.display='none';
    document.getElementById('home').style.display='flex';
    renderHome();
    return;
  }
  document.getElementById('app').style.display='grid';
  document.getElementById('home').style.display='none';
  const tasks = flow();
  // exclude welcome + done from the numbered progress (intro + completion)
  const RAIL_SKIP = ['welcome','done'];
  const steps = tasks.filter(t=>!RAIL_SKIP.includes(t.id));
  const doneN = steps.filter(t=>t.done()).length;
  const active = current || (tasks.find(t=>!t.done())||tasks[tasks.length-1]).id;

  document.getElementById('titlebar').textContent = 'Heard — Set up ' + planWord();
  document.getElementById('rail-title').textContent = 'Set up ' + planWord();
  document.getElementById('rail-plan').textContent = planWord();
  document.getElementById('prog-fill').style.width = (steps.length? (doneN/steps.length*100):0) + '%';
  document.getElementById('prog-n').textContent = doneN + ' / ' + steps.length;

  const ul=document.getElementById('tasks'); ul.innerHTML='';
  tasks.forEach(t=>{
    if(RAIL_SKIP.includes(t.id)) return;
    const done=t.done(), on=t.id===active;
    const li=document.createElement('li');
    li.className='task'+(done?' done':'')+(on?' active':'');
    li.innerHTML=`<span class="dot">✓</span><span>${t.label}</span>`;
    li.onclick=()=>{ current=t.id; render(); };
    ul.appendChild(li);
  });

  const stage=document.getElementById('stage');
  stage.innerHTML = (SCREENS[active]||SCREENS.welcome)();
  const el=stage.querySelector('.screen'); if(el) el.classList.add('show');
  // Focus the mic-test field so push-to-talk dictation types into it.
  const mi=stage.querySelector('#mic-in'); if(mi) setTimeout(()=>mi.focus(), 60);
  // NOTE: no auto-greet here — the daemon's _maybe_greet plays the first-launch
  // hello once (greeted-gated). A second auto-greet here overlapped it ("two
  // voices at once"). The "Say hello" button stays for a manual replay.
  // Default the mode to Co-pilot when arriving at the mode step with no pick.
  if(active==='mode' && !['copilot','companion','focus'].includes((S.mode||'').toLowerCase())){
    S.mode='copilot'; bridge('set_mode',{mode:'copilot'});
  }
  // Default the voice to Jarvis when arriving at the voice step with no pick.
  if(active==='voice' && !['aria','friday','jarvis','atlas'].includes((S.voice||'').toLowerCase())){
    S.voice='jarvis'; bridge('set_voice',{voice:'jarvis'}); setTimeout(render,0);
  }
}
// Pick a mode in place (no flash) — toggle .sel; CSS drives the radio + play.
function pickMode(id){
  S.mode=id; bridge('set_mode',{mode:id});
  document.querySelectorAll('.modecard').forEach(c=>c.classList.toggle('sel', c.dataset.mode===id));
}
// Pick a voice WITHOUT a full re-render (no flash) — toggle .sel + the ✓ note.
function pickVoice(id){
  S.voice=id; bridge('set_voice',{voice:id});
  document.querySelectorAll('.vcard').forEach(c=>c.classList.toggle('sel', c.dataset.voice===id));
  const note=document.querySelector('.voice-note');
  if(note) note.textContent='✓ '+(({jarvis:'Jarvis',aria:'Aria',friday:'Friday',atlas:'Atlas'})[id]||id);
}
// Voice preview: poke native to synth + play a sample in that voice.
function previewVoice(btn, voice){
  document.querySelectorAll('.vpreview.playing').forEach(b=>{b.classList.remove('playing');b.innerHTML='<span class="tri">▶</span> Preview';});
  btn.classList.add('playing'); btn.innerHTML='<span class="tri">♪</span> Playing';
  bridge('preview_voice',{voice});
  setTimeout(()=>{ btn.classList.remove('playing'); btn.innerHTML='<span class="tri">▶</span> Preview'; }, 3500);
}
// Mic test: compare the dictation to the target. Close enough → snap the field
// to the clean sentence + green ✓ (hides STT imperfection). Way off → red warn.
const MIC_TARGET = "Ship the payments migration, then run the tests.";
function _micWords(s){ return s.toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(Boolean); }
function _micSim(a){ const A=_micWords(a), B=_micWords(MIC_TARGET); if(!A.length||!B.length) return 0;
  const setA=new Set(A); let hit=0; for(const w of new Set(B)) if(setA.has(w)) hit++; return hit/new Set(B).size; }
let _micTimer=null;
function micHeard(v){ clearTimeout(_micTimer); _micTimer=setTimeout(()=>micEval(v), 450); }
function micEval(v){
  const ok=document.getElementById('mic-ok'), inp=document.getElementById('mic-in');
  if(!ok) return;
  if(!v || !v.trim()){ ok.style.opacity='0'; return; }
  if(_micSim(v) >= 0.55){
    if(inp) inp.value = MIC_TARGET;   // snap to the clean sentence
    ok.textContent = '✓ Heard you clearly — Heard Whisper is working.';
    ok.style.color = 'var(--ok)';
  } else {
    ok.textContent = '⚠ Heard you — but that’s not the sentence. Give the line above another read.';
    ok.style.color = '#e5484d';
  }
  ok.style.opacity = '1';
}
// Native calls this on the REAL Right-⌘ down/up (local key monitor) so the
// LISTENING label + orb pulse only show while actually listening, and the
// field stays focused so the serve's transcription types into it.
window.__micListening = function(on){
  const lbl=document.getElementById('mic-lbl'); if(lbl) lbl.style.visibility=on?'visible':'hidden';
  const wave=document.getElementById('mic-wave');
  if(wave){ wave.style.opacity=on?'1':'.35';
    wave.querySelectorAll('.wf-bar').forEach(b=>b.style.animationPlayState=on?'running':'paused'); }
  if(on){ const i=document.getElementById('mic-in'); if(i) i.focus(); }
};
function next(){
  // Step to the NEXT screen in sequence — even already-completed ones — so the
  // user always walks the whole list (and can click through fast). Don't skip.
  const tasks = flow();
  const activeId = current || tasks[0].id;
  const idx = tasks.findIndex(t=>t.id===activeId);
  const nextT = tasks[idx+1];
  if(nextT){ current=nextT.id; render(); }
  else { bridge('close'); }   // past the last step → close marks onboarded → Home
}

        </button>
        <button class="btn btn-oauth" onclick="bridge('signin_github')">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="#0b0b0c"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 012-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          <span>Continue with GitHub</span>
        </button>
        <div class="or-divider"><span>or</span></div>
        <input class="field" id="email" type="email" placeholder="you@example.com">
        <button class="btn btn-primary" onclick="bridge('signin_email',{email:document.getElementById('email').value})">Continue with email</button>
      </div>
      <div class="spacer"></div>
    </section>`;
  },
  connect(){ return `<section class="screen">
      <div class="eyebrow">Connect your tools</div>
      <h1 class="hero" style="font-size:44px">Connect your tools.</h1>
      <p class="lede" style="max-width:440px">Heard narrates your agents wherever they run. Connect at least one now — you can add more later.</p>
      <div style="display:flex;flex-direction:column;gap:11px;margin-top:20px;max-width:500px">
        <div style="background:#fff;border:1px solid #ececec;border-radius:13px;padding:14px 16px;display:flex;align-items:center;gap:13px">
          <div style="width:36px;height:36px;border-radius:9px;flex:0 0 auto;background:#cc785c;display:flex;align-items:center;justify-content:center;color:#f3ece2;font-size:18px">✳</div>
          <div style="flex:1"><div style="font:600 14px var(--sans);color:var(--ink)">Claude Code</div><div style="font:400 11.5px var(--sans);color:#8a8a8a">Anthropic · terminal &amp; IDE</div></div>
          ${S.claudeConnected?`<span class="done-note">✓ Connected</span>`:`<button class="btn btn-primary" style="padding:8px 16px;font-size:12px" onclick="bridge('connect_agent')">Connect</button>`}
        </div>
        <div style="background:#fff;border:1px solid #ececec;border-radius:13px;padding:14px 16px;display:flex;align-items:center;gap:13px">
          <div style="width:36px;height:36px;border-radius:9px;flex:0 0 auto;background:#0b0b0c;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px">✦</div>
          <div style="flex:1"><div style="font:600 14px var(--sans);color:var(--ink)">Codex</div><div style="font:400 11.5px var(--sans);color:#8a8a8a">OpenAI · CLI</div></div>
          ${S.codexConnected?`<span class="done-note">✓ Connected</span>`:`<button class="btn btn-ghost" style="padding:8px 16px;font-size:12px" onclick="bridge('connect_codex')">Connect</button>`}
        </div>
        <div style="background:#faf9f7;border:1px solid #f0eeea;border-radius:13px;padding:14px 16px;display:flex;align-items:center;gap:13px;opacity:.72">
          <div style="width:36px;height:36px;border-radius:9px;flex:0 0 auto;background:#e6e2dc;display:flex;align-items:center;justify-content:center;color:#8a8580;font-size:15px">▸</div>
          <div style="flex:1"><div style="font:600 14px var(--sans);color:#6F6F6F">Cursor</div><div style="font:400 11.5px var(--sans);color:#a3a3a3">Editor integration</div></div>
          <span style="font:500 10.5px var(--mono);letter-spacing:.05em;text-transform:uppercase;color:#a3a3a3;border:1px solid #e2ddd8;padding:6px 11px;border-radius:999px">Coming soon</span>
        </div>
      </div>
      <div class="spacer"></div>
      <div class="row"><button class="btn btn-primary" onclick="next()">Save &amp; continue</button><button class="btn btn-ghost" onclick="next()">Skip for now</button></div>
    </section>`; },
  mode(){
    // Real modes: copilot (default/recommended) / companion / focus. Same code
    // event, three verbosities — matches the Claude Design.
    const sel = ['copilot','companion','focus'].includes((S.mode||'').toLowerCase())
      ? (S.mode||'').toLowerCase() : 'copilot';
    const opts = [
      ['copilot','Co-pilot','compact, eyes on screen','Password reset is done, 96 tests have passed, waiting for review.', true],
      ['companion','Companion','fuller, eyes off screen','We’ve wired up the full password-reset flow. Reset-request issued a 15-minute token and emailed the reset link, the token rendered the form, and reset-confirm verified it, rehashed the password, and killed all sessions. All 96 tests have passed, ready for review.', false],
      ['focus','Focus','only if needed','need your attention sir, tests are ready for review', false],
    ];
    const rows = opts.map(o=>`
      <div class="modecard ${sel===o[0]?'sel':''}" data-mode="${o[0]}" onclick="pickMode('${o[0]}')">
        <div class="mode-radio"></div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px"><b style="font-size:15px">${o[1]}</b>${o[4]?`<span class="mode-rec">Recommended</span>`:''}<span class="mode-tag">${o[2]}</span></div>
          <div style="font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink-2);margin-top:4px;line-height:1.4">${o[0]==='focus'?`<span style="font-family:var(--sans);font-style:normal;font-size:12px;color:var(--ink-3)">(silent, until) </span>`:''}“${o[3]}”</div>
        </div>
        <button class="mode-play" data-line="${o[3].replace(/"/g,'&quot;')}" onclick="event.stopPropagation();bridge('preview_line',{text:this.dataset.line})">▶</button>
      </div>`).join('');
    return `<section class="screen">
      <div class="eyebrow">Choose your mode</div>
      <h1 class="hero" style="font-size:38px">Choose your mode.</h1>
      <p class="lede" style="max-width:520px;margin-top:6px">How much should Heard say? Here’s the same update, three ways.</p>
      <div style="margin-top:10px;background:#1c1c22;border-radius:12px;padding:12px 16px;max-width:600px;font:400 11px/1.7 var(--mono);color:#c6c6cc">
        <div style="color:#8a8a92;margin-bottom:6px;font-weight:500">claude-code</div>
        Wired up the full password-reset flow. <span style="color:#e8e8ea">/auth/reset-request</span> issues a signed 15-minute token and emails the reset link, <span style="color:#e8e8ea">/reset/:token</span> renders the form with validation, and <span style="color:#e8e8ea">/auth/reset-confirm</span> verifies it, rehashes the password, and kills old sessions so a stale cookie can’t get back in. The reset-email template’s wired into the mailer too. <span style="color:#7cc47c">All 96 tests pass</span> and the typecheck’s clean, so nothing else needs you here. Ready for review.
      </div>
      <div style="font:600 10px var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin:11px 0 7px">Heard boils that down to</div>
      <div style="display:flex;flex-direction:column;gap:8px;max-width:600px">${rows}</div>
      <div class="spacer"></div>
      <div class="row"><button class="btn btn-primary" onclick="if(!S.mode){S.mode='copilot';bridge('set_mode',{mode:'copilot'})}next()">Save &amp; continue</button></div>
    </section>`;
  },
  voice(){
    // Jarvis first + flagged "most picked"; it's the default selection.
    const voices=[
      ['jarvis','Jarvis','Butler','oklch(86% .08 80),oklch(70% .1 72)', true],
      ['aria','Aria','Calm','oklch(78% .07 240),oklch(62% .08 250)'],
      ['friday','Friday','Warm','oklch(80% .09 30),oklch(64% .12 32)'],
      ['atlas','Atlas','Cinematic','oklch(82% .07 150),oklch(64% .08 152)'],
    ];
    // Effective selection: an onboarding pick if there is one, else default to
    // Jarvis (a custom pre-existing voice like "george" isn't one of these 4).
    const sel = ['aria','friday','jarvis','atlas'].includes((S.voice||'').toLowerCase())
      ? (S.voice||'').toLowerCase() : 'jarvis';
    const pname = (voices.find(v=>v[0]===sel)||[])[1];
    return `<section class="screen">
      <div class="eyebrow">${S.plan==='power'?'Choose a cloud voice':'Choose your voice'}</div>
      <h1 class="hero" style="font-size:56px">Choose your voice.</h1>
      <p class="lede">Cloud voices are included with your plan. Hit Preview to hear each, then pick the one that sounds like you.</p>
      <div class="vcards">${voices.map(v=>`
        <div class="vcard ${sel===v[0]?'sel':''}" data-voice="${v[0]}" onclick="pickVoice('${v[0]}')">
          <div class="ck">✓</div>
          ${v[4]?`<div class="vbadge">most picked</div>`:''}
          <div class="av" style="background:radial-gradient(circle at 50% 50%,${v[3]})"></div>
          <div class="nm">${v[1]}</div><div class="ta">${v[2]}</div>
          <button class="vpreview" onclick="event.stopPropagation();previewVoice(this,'${v[0]}')"><span class="tri">▶</span> Preview</button>
        </div>`).join('')}</div>
      <div class="spacer"></div>
      <div class="row">
        <button class="btn btn-primary" onclick="next()">Continue</button>
        <span class="done-note voice-note">✓ ${pname||'Jarvis'}</span>
      </div>
    </section>`; },
  // Heard Whisper: first enable it (design's "Speak, don't type"), then the
  // read-aloud mic test folds in so they feel it work before moving on.
  whisper(){
    const on = S.whisperOn;
    const line=(icon,head,body)=>`<div style="display:flex;gap:12px;align-items:flex-start"><span style="font-size:17px;line-height:1.3;flex:0 0 auto">${icon}</span><div style="font:400 13px/1.45 var(--sans);color:var(--ink-2)"><b style="color:var(--ink)">${head}</b> ${body}</div></div>`;
    const modes=[
      line('🎙️','Push to talk:','hold <span class="kbd" style="font-size:11px">Right ⌘</span> and talk anywhere you type. Release to send.'),
      line('👂','Hands-free (ambient):','always on, no keys. Just talk and Heard dictates as you go, standing down when you fall quiet and waking on your next words.'),
    ].join('');
    const notes=[
      line('⏸️','Pauses itself on calls:','it watches your mic and steps aside while you talk. You can also pause Heard from the menu bar.'),
      line('🎧','Use headphones','so you keep to yourself and Heard doesn’t mistake its own voice for yours. On speaker? Cut Heard off anytime, and it lines up its reports until you stop talking.'),
    ].join('');
    const rows=`${modes}<div style="font:600 10px var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin:6px 0 -2px">Good to know</div>${notes}`;
    const bars=[['#cf7d64','38%',''],['#c07a95','78%','.1s'],['#8c93d6','100%','.2s'],['#a98bb4','56%','.3s'],['#cf7d64','84%','.15s']].map(([c,h,d])=>`<div class="wf-bar" style="width:3px;height:${h};border-radius:3px;background:${c};transform-origin:center;animation:wf 1s ease-in-out infinite ${d};animation-play-state:paused"></div>`).join('');
    const test = `
      <div style="max-width:490px;margin-top:16px;font:400 13px/1.5 var(--sans);color:var(--ink-2)">Hold <span class="kbd">Right ⌘</span> and read this aloud (don’t type): <span style="font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink)">“Ship the payments migration, then run the tests.”</span></div>
      <div style="margin-top:11px;background:#fff;border:1px solid #ece7e2;border-radius:15px;box-shadow:0 14px 30px -20px rgba(20,20,40,.3);padding:14px 16px;max-width:490px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:32px;height:32px;border-radius:50%;flex:0 0 auto;background:#cf5b3c;display:flex;align-items:center;justify-content:center"><div style="position:relative;width:9px;height:13px;border:1.7px solid #fff;border-radius:5px"><div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:1.7px;height:3.5px;background:#fff"></div></div></div>
          <div id="mic-wave" style="display:flex;align-items:center;gap:2.5px;height:20px;flex:1;opacity:.35">${bars}</div>
          <span id="mic-lbl" style="font:500 10px var(--mono);color:#8a8a8a;visibility:hidden">LISTENING</span>
        </div>
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid #f2efeb;font-family:var(--serif);font-style:italic;font-size:16px;line-height:1.4;color:var(--ink);min-height:22px">“<input id="mic-in" oninput="micHeard(this.value)" placeholder="…your dictation shows here" style="border:none;outline:none;background:transparent;font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink);width:calc(100% - 22px)">”</div>
        <div id="mic-ok" style="margin-top:7px;font:500 12px var(--sans);opacity:0;transition:opacity .3s;color:var(--ok)">✓ Heard you clearly.</div>
      </div>`;
    return `<section class="screen">
      <div class="eyebrow">Heard Whisper</div>
      <h1 class="hero" style="font-size:44px">Speak, don’t type.</h1>
      ${on
        ? (S.axGranted
            ? `<p class="lede" style="max-width:500px;margin-top:12px">Whisper’s on. Read the line below to try it.</p>${test}`
            : `<p class="lede" style="max-width:500px;margin-top:12px">Whisper’s on — one last permission.</p>
               <div style="max-width:500px;margin-top:12px;font:400 14px/1.6 var(--sans);color:var(--ink-2)">Heard needs <strong>Accessibility</strong> access to catch the <span class="kbd">Right ⌘</span> key anywhere you type. Without it, push-to-talk can’t work.</div>
               <div class="row" style="margin-top:16px"><button class="btn btn-primary" onclick="bridge('grant_accessibility')">Enable Accessibility</button></div>
               <p style="margin-top:12px;font:400 12px var(--sans);color:var(--ink-3)">Toggle <strong>Heard</strong> on in System Settings → Privacy & Security → Accessibility. This screen updates once it’s granted.</p>`)
        : `<p class="lede" style="max-width:500px;margin-top:12px">Heard’s voice-to-text. Two ways to dictate to your agents instead of typing:</p>
           <div style="max-width:540px;margin-top:18px;display:flex;flex-direction:column;gap:12px">${rows}</div>
           <p style="margin-top:20px;font:400 13px var(--sans);color:var(--ink-2)">Press below to enable Heard Whisper.</p>`}
      <div class="spacer"></div>
      <div class="row">${on
        ? `<button class="btn btn-primary" onclick="next()">Continue</button><button class="btn btn-ghost" onclick="next()">Skip for now</button>`
        : `<button class="btn btn-primary" onclick="bridge('enable_whisper')">Enable Heard Whisper</button><button class="btn btn-ghost" onclick="next()">Maybe later</button>`}</div>
    </section>`;
  },
  phone(){ return `<section class="screen">
      <div class="eyebrow">Pair mobile</div>
      <h1 class="hero" style="font-size:52px">Now take it anywhere.</h1>
      <p class="lede" style="max-width:480px">The loop doesn’t stop at your desk. <span style="font-family:var(--serif);font-style:italic;color:var(--terra)">Heard Mobile</span> keeps you in it after you step away — hear your agents and reply by voice from your phone. You’ll pair it from the menu bar; nothing to set up right now.</p>
      <div class="orb sm" style="margin-top:12px"></div>
      <div class="spacer"></div>
      <div class="row"><button class="btn btn-primary" onclick="next()">Pair later</button></div>
    </section>`; },

  // Completion (both flows end here). Closing marks onboarded → Mission Control.
  done(){
    const who = S.voice ? S.voice[0].toUpperCase()+S.voice.slice(1) : 'Aria';
    const sub = S.plan==='power'
      ? 'The full loop is live. Hold <span class="kbd">Right ⌘</span> to talk, and Heard follows you to mobile.'
      : `${who}’s listening to your agents. Now — focus on what matters.`;
    return `<section class="screen">
      <div class="eyebrow">All set</div>
      <h1 class="hero" style="font-size:56px">You’re all set.</h1>
      <p class="lede">${sub}</p>
      <div class="orb"></div>
      <div class="spacer"></div>
      <div class="row"><button class="btn btn-primary" onclick="bridge('close')">Start using Heard</button></div>
    </section>`;
  },

  // generic action screen (design shell: eyebrow + serif title + lede + orb + CTA)
  _act(eyebrow,title,body,cta,onclick,done,doneLabel,orb,secLabel,secClick){
    return `<section class="screen">
      <div class="eyebrow">${eyebrow}</div>
      <h1 class="hero" style="font-size:56px">${title}</h1>
      <p class="lede">${body}</p>
      ${orb?'<div class="orb sm"></div>':''}
      <div class="spacer"></div>
      <div class="row">
        ${done
          ? `<button class="btn btn-primary" onclick="next()">Continue</button><span class="done-note">✓ ${doneLabel}</span>`
          : `<button class="btn btn-primary" onclick="${onclick}">${cta}</button>`}
        ${secLabel?`<button class="btn btn-ghost" onclick="${secClick}">${secLabel}</button>`:''}
      </div>
    </section>`;
  },
  _msg(eyebrow,title,ok){
    return `<section class="screen"><div class="eyebrow">${eyebrow}</div>
      <h1 class="hero" style="font-size:56px">${title}</h1><div class="spacer"></div>
      <div class="row"><button class="btn btn-primary" onclick="next()">Continue</button></div></section>`;
  },
};

render();
</script>
</body>
</html>
