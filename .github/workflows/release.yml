name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-app:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install py2app "setuptools<80"
          # Install Heard + its runtime deps so py2app can collect them.
          pip install -e ".[dev]"

      - name: Test gate (don't ship a broken build)
        run: |
          ruff check heard/ tests/
          pytest -q

      - name: Build Heard.app
        env:
          PYTHON: python
        run: |
          cd packaging
          ./build-app.sh

      - name: Zip the bundle
        run: |
          cd packaging/dist
          zip -ry "Heard-${GITHUB_REF_NAME:-dev}.zip" Heard.app

      - name: Upload artifact (for workflow_dispatch / non-tag runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: heard-app
          path: packaging/dist/Heard-*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/Heard-*.zip
          body: |
            ### Install

            1. Download `Heard-${{ github.ref_name }}.zip` below
            2. Unzip
            3. Drag `Heard.app` into `/Applications`
            4. **First launch:** right-click `Heard.app` → **Open** (unsigned build, so macOS Gatekeeper will refuse a normal double-click — right-click bypasses that one time)
            5. The onboarding window walks you through three screens: API key (optional, for the Jarvis persona), voice, and the silence/replay hotkey
            6. Run `heard install claude-code` in your terminal to wire Heard up to your agent

            ### Voice — two options

            - **Free local (Kokoro)** — skip the ElevenLabs key field in onboarding. Downloads a ~337 MB voice model on first synth call. Best on Macs with 12 GB+ RAM.
            - **Premium (ElevenLabs)** — paste your `sk_…` key on screen 2 of onboarding. Tiny daemon (~80 MB), pay-per-character (typically pennies a day), best voice quality.

            ### Hotkey

            **Right Option** key (right of your spacebar):
            - **Tap** — silence the current narration
            - **Long-press** (≥ 400 ms) — replay the last line

            macOS will ask once for Accessibility access — click Allow.

            ### Try without installing

            ```bash
            heard demo
            ```

            Plays a scripted ~20-second exchange so you can hear the voice + persona before wiring up any agent.

            ### CLI alternative

            ```bash
            pipx install heard
            heard install claude-code
            ```

            See the [README](https://github.com/sodiumsun/heard#readme) for full docs and troubleshooting.
